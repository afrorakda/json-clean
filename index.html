<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Json-clean - Fridge Combo</title>
    <link rel="apple-touch-icon" href="image_26.png">
    <link rel="icon" type="image/png" href="image_26.png">
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
            --error: #e74c3c;
            --placeholder: #bbb;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; padding: 0;
            touch-action: manipulation; 
        }

        body {
            background-color: var(--bg); color: var(--main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding: calc(env(safe-area-inset-top, 20px) + 10px) 20px env(safe-area-inset-bottom, 20px);
        }

        .fridge-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; flex-grow: 1; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; }

        .hub-link {
            text-decoration: none; font-size: 0.8rem; font-weight: 800; color: var(--main);
            background: var(--accent); padding: 8px 12px; border-radius: 10px;
        }

        .workspace { width: 100%; display: flex; flex-direction: column; gap: 10px; flex-grow: 1; margin-bottom: 20px; }
        .input-header { display: flex; justify-content: space-between; align-items: center; padding: 0 5px; }
        .input-label { font-size: 0.7rem; font-weight: 800; color: #bbb; text-transform: uppercase; letter-spacing: 0.5px; }
        #statusLabel { font-size: 0.75rem; font-weight: 800; color: #bbb; }

        textarea {
            width: 100%; flex-grow: 1; min-height: 300px; padding: 20px; 
            border-radius: var(--radius); border: 2px solid var(--accent); background: var(--input-bg);
            font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 14px; line-height: 1.5; color: var(--main);
            outline: none; resize: none; -webkit-appearance: none; -webkit-text-fill-color: var(--main); opacity: 1 !important;
            transition: border-color 0.2s;
        }
        textarea:focus { border-color: var(--main); }
        textarea.error { border-color: var(--error); color: var(--error); -webkit-text-fill-color: var(--error); }
        textarea::placeholder { color: var(--placeholder); -webkit-text-fill-color: var(--placeholder); }

        .action-row { display: flex; gap: 10px; width: 100%; }
        .btn { flex: 1; padding: 20px; border-radius: var(--radius); font-size: 1rem; font-weight: 800; border: none; cursor: pointer; }
        .btn-main { background: var(--main); color: #fff; }
        .btn-sub { background: var(--accent); color: var(--main); }
        .btn:active { transform: scale(0.98); opacity: 0.9; }

        .footer-btns { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 40px 0 30px; }
        .kofi-btn, .home-btn {
            width: 100%; max-width: 250px; padding: 14px; border-radius: var(--radius);
            font-weight: 800; font-size: 0.9rem; text-decoration: none; text-align: center; border: none; cursor: pointer;
        }
        .kofi-btn { background: #fff; color: var(--main); border: 2px solid var(--main); }
        .home-btn { background: var(--accent); color: var(--main); }

        footer { font-size: 0.75rem; color: #bbb; text-align: center; padding-bottom: 20px; font-weight: 600; line-height: 1.6; }
        footer a { color: inherit; text-decoration: underline; }

        #toast {
            position: fixed; bottom: 80px; background: var(--main); color: #fff;
            padding: 10px 20px; border-radius: 20px; font-size: 0.8rem; font-weight: 800;
            opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 2000;
        }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 3000; }
        .modal-content { background: #fff; padding: 30px; border-radius: var(--radius); width: 85%; max-width: 320px; position: relative; text-align: center; }
        .close-icon { position: absolute; top: 10px; right: 15px; font-size: 1.5rem; color: #aaa; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="fridge-container">
    <header>
        <h1>Json-clean</h1>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>

    <div class="workspace">
        <div class="input-header">
            <span class="input-label">Paste JSON here</span>
            <span id="statusLabel">Standby</span>
        </div>
        <textarea id="jsonArea" placeholder='{"id":1,"status":"ok"}' spellcheck="false"></textarea>
    </div>

    <div class="action-row">
        <button class="btn btn-sub" id="clrBtn">Clear</button>
        <button class="btn btn-main" id="copyBtn">Copy Clean JSON</button>
    </div>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️Buy me a coffee</a>
        <button class="home-btn" id="homeBtn">Add to Home Screen</button>
    </div>

    <footer id="dynamicFooter">
        No login / No tracking / No ads / Browser only<br>
        <a href="https://afrorakda.com/privacy/">Privacy Policy</a><br>
        afrorakda © 2026
    </footer>
</div>

<div id="toast">Copied!</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close-icon" id="closeModal">&times;</span>
        <h3 style="margin-top:0; font-weight:800">📱 Install</h3>
        <p style="margin: 15px 0; color: #666; font-size: 0.9rem;">Add to your home screen.</p>
        <div style="text-align: left; font-size: 0.9rem; line-height: 1.6;">
            <p>🍏 <b>iPhone (Safari):</b><br>Share > Add to Home Screen</p><br>
            <p>🤖 <b>Android (Chrome):</b><br>Menu (⋮) > Add to home screen</p>
        </div>
    </div>
</div>

<script>
    const area = document.getElementById('jsonArea');
    const status = document.getElementById('statusLabel');
    const clrBtn = document.getElementById('clrBtn');
    const copyBtn = document.getElementById('copyBtn');
    const toast = document.getElementById('toast');

    function formatJSON() {
        const val = area.value.trim();
        if (!val) {
            resetStatus();
            return;
        }
        try {
            const parsed = JSON.parse(val);
            const cleaned = JSON.stringify(parsed, null, 2);
            area.value = cleaned;
            area.classList.remove('error');
            status.textContent = "Cleaned!";
            status.style.color = "#2ecc71";
        } catch (e) {
            area.classList.add('error');
            status.textContent = "Invalid JSON";
            status.style.color = "var(--error)";
        }
    }

    function resetStatus() {
        area.classList.remove('error');
        status.textContent = "Standby";
        status.style.color = "#bbb";
    }

    area.oninput = formatJSON;

    clrBtn.onclick = () => {
        area.value = "";
        resetStatus();
        area.focus();
    };

    copyBtn.onclick = () => {
        if (!area.value || area.classList.contains('error')) return;
        navigator.clipboard.writeText(area.value).then(() => {
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        });
    };

    document.getElementById('homeBtn').onclick = () => document.getElementById('modal').style.display = 'flex';
    document.getElementById('closeModal').onclick = () => document.getElementById('modal').style.display = 'none';
    window.onclick = (e) => { if (e.target == document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; };

    async function loadFooter() {
        try {
            const res = await fetch('footer.json');
            if (res.ok) {
                const data = await res.json();
                if (data.footerHtml) document.getElementById('dynamicFooter').innerHTML = data.footerHtml;
            }
        } catch(e) {}
    }
    window.onload = loadFooter;
</script>

</body>
</html>
